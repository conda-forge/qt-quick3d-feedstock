context:
  version: "6.10.2"
  maj_min: ${{ (version | split('.'))[:2] | join('.') }}

package:
  name: qt6-quick3d
  version: ${{ version }}

source:
  url: https://download.qt.io/official_releases/qt/${{ maj_min }}/${{ version }}/submodules/qtquick3d-everywhere-src-${{ version }}.tar.xz
  md5: 080b709ad2f6bc304000320c3862019c

build:
  number: 1
  # 2-stage build also needed :)
  # skip: ${{ build_platform != target_platform }}

requirements:
  build:
    - cmake
    - ninja
    - perl
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - if: build_platform != target_platform
      then:
        - qt6-main ${{ version }}.*
        - qt6-quick3d ${{ version }}.*
  host:
    - qt6-main ${{ version }}.*
    - zlib
    - if: linux
      then:
        - libgl-devel
        - libegl-devel
        - libopengl-devel
        - libglx-devel
    - if: not osx
      then:
        - libvulkan-headers
        - libvulkan-loader
  run:
    - qt6-main ${{ version }}.*
  run_exports:
    - ${{ pin_subpackage('qt6-quick3d', upper_bound='x.x') }}

tests:
  - script:
      - if: unix
        then:
          - test -d $PREFIX/include/qt6/QtQuick3D
          - test -f $PREFIX/lib/libQt6Quick3D${SHLIB_EXT}
        else:
          - if not exist %PREFIX%\\Library\\include\\qt6\\QtQuick3D exit 1
          - if not exist %PREFIX%\\Library\\lib\\Qt6Quick3D.lib exit 1
          - if not exist %PREFIX%\\Library\\bin\\Qt6Quick3D.dll exit 1

about:
  homepage: http://qt-project.org
  license: GPL-3.0-only
  license_file: LICENSES/GPL-3.0-only.txt
  summary: Qt is a cross-platform application and UI framework.
  description: |
    Qt helps you create connected devices, UIs & applications that run
    anywhere on any device, on any operating system at any time.
  documentation: http://doc.qt.io/
  repository: https://github.com/qt/qtquick3d

extra:
  recipe-maintainers:
    - jschueller
    - conda-forge/qt-main
  feedstock-name: qt-quick3d
